name: Unity Test Suite

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Rust toolchain
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          source $HOME/.cargo/env
          rustup install stable
          rustup default stable
      - name: Install SpacetimeDB CLI from specific branch
        run: |
          cd unity-test
          git clone https://github.com/clockworklabs/SpacetimeDB.git
          cd SpacetimeDB
          git checkout v0.12.0-beta-hotfix2
          cargo build --release -p spacetimedb-cli
          sudo mv target/release/spacetime /usr/bin/spacetime
          # This tests the "currently released" version of SpacetimeDB (and is also much faster than building from scratch)
          # - name: Install SpacetimeDB CLI v0.12.0-beta
          # run: |
          # wget https://github.com/clockworklabs/SpacetimeDB/releases/download/v0.12.0-beta/spacetime.linux-amd64.tar.gz \
          # && tar xzvf spacetime.linux-amd64.tar.gz \
          # && sudo mv spacetime /usr/bin/spacetime \
          # && rm -f spacetime.linux-amd64.tar.gz
      - name: Generate client bindings
        run: |
          cd unity-test/server
          bash ./generate.sh -y
      - name: Start SpacetimeDB
        run: |
          spacetime start &
          disown
      - uses: actions/cache@v3
        with:
          path: |
            unity-test/server/target
            ~/.cargo
          key: server-target-SpacetimeDBUnityTestsuite-Linux-x86-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            server-target-SpacetimeDBUnityTestsuite-Linux-x86-${{ runner.os }}-
            server-target-SpacetimeDBUnityTestsuite-
      - name: Publish module to SpacetimeDB
        run: |
          cd unity-test/server 
          spacetime publish -s local untitled-circle-game
      - uses: actions/cache@v3
        with:
          path: unity-test/client/Library
          key: Library-SpacetimeDBUnityTestsuite-Linux-x86
          restore-keys: |
            Library-SpacetimeDBUnityTestsuite-
            Library-
      - name: Set up Unity
        uses: game-ci/unity-test-runner@v4
        with:
          unityVersion: 2022.3.32f1  # Adjust Unity version to a valid tag
          projectPath: unity-test/client  # Path to the Unity project subdirectory
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          testMode: playmode
          useHostNetwork: true
          # testMode: all  # Runs both Edit Mode and Play Mode tests
          # coverageOptions: generateAdditionalMetrics;generateHtmlReport;generateBadgeReport;dontClear
          # artifactsPath: artifacts
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          # UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          # UNITY_VERSION: 2022.3.2f1
          # PROJECT_PATH: client
